# App
spring.application.name=ANVI-SOS
server.port=8081

# ================= DATABASE =================
spring.datasource.url=${ANVI_DB_URL}
spring.datasource.username=${ANVI_DB_USER}
spring.datasource.password=${ANVI_DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ================= JWT =================
security.jwt.secret=${ANVI_JWT_SECRET}
security.jwt.access-ttl-seconds=${ANVI_JWT_ACCESS_TTL_SECONDS}
security.jwt.refresh-ttl-seconds=${ANVI_JWT_REFRESH_TTL_SECONDS}

# ================= QR =================
anvi.qr.base-url=${ANVI_QR_BASE_URL}

# ================= ESMS (SMS Provider) =================
# Dang ky tai https://esms.vn de lay API key
esms.api-key=YOUR_ESMS_API_KEY
esms.api-secret=YOUR_ESMS_API_SECRET
esms.brand-name=Baotri
esms.enabled=false

# ================= GMAIL SMTP =================
# Buoc 1: Bat 2FA tai https://myaccount.google.com/security
# Buoc 2: Tao App Password tai https://myaccount.google.com/apppasswords
# Buoc 3: Dien GMAIL_USERNAME va GMAIL_APP_PASSWORD vao file .env
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME}
spring.mail.password=${GMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ================= EMAIL SETTINGS =================
anvi.email.from=ANVI-SOS <${GMAIL_USERNAME:genetix.noreply@gmail.com}>
anvi.email.otp-ttl-minutes=10
anvi.email.notification.enabled=true

# ================= AI CHATBOT =================
# Provider: OpenRouter (OpenAI Compatible)
spring.ai.openai.api-key=${OPENROUTER_API_KEY}
spring.ai.openai.base-url=https://openrouter.ai/api/v1
spring.ai.openai.chat.options.model=inclusionai/ring-2.6-1t:free
spring.ai.openai.chat.options.temperature=0.7

# Custom AI Behavior
anvi.ai.chatbot.system-prompt=Bạn là trợ lý AI chuyên nghiệp của hệ thống ANVI-SOS. Nhiệm vụ của bạn là hỗ trợ người dùng trong các tình huống khẩn cấp và cung cấp hướng dẫn sơ cứu. Hãy luôn sử dụng định dạng Markdown để câu trả lời dễ đọc: sử dụng tiêu đề (##, ###) cho các phần chính, danh sách (bullet points) cho các bước thực hiện, và in đậm (**) cho các lưu ý quan trọng hoặc số điện thoại khẩn cấp. Trả lời ngắn gọn, bình tĩnh và chuyên nghiệp. Nếu tình huống nguy hiểm, hãy khuyên gọi 115 ngay lập tức.